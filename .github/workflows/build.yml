name: Build KMP Project

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    # Linux Runner: Android and Wasm targets
    - name: Build Android & Wasm (Linux)
      if: runner.os == 'Linux'
      run: sh gradlew :composeApp:assembleDebug :composeApp:testDebugUnitTest :composeApp:wasmJsBrowserProductionWebpack
      
    # macOS Runner: iOS targets
    - name: Build iOS (macOS)
      if: runner.os == 'macOS'
      run: sh gradlew :composeApp:iosX64MainBinaries :composeApp:iosSimulatorArm64MainBinaries
      
    # Windows Runner: Desktop target
    - name: Build Desktop (Windows)
      if: runner.os == 'Windows'
      shell: cmd
      run: gradlew :composeApp:desktopJar :composeApp:desktopTest
