name: Build KMP Project

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # Build Android and Wasm targets on Linux
  build-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
    
    - name: Build Android and Wasm
      run: ./gradlew :composeApp:assembleDebug :composeApp:wasmJsBrowserProductionWebpack
    
    - name: Run Common and Android tests
      run: ./gradlew :composeApp:testDebugUnitTest :composeApp:wasmJsBrowserTest

  # Build iOS targets on macOS
  build-macos:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
    
    - name: Build iOS targets
      run: ./gradlew :composeApp:iosX64MainBinaries :composeApp:iosSimulatorArm64MainBinaries

  # Build Desktop target on Windows
  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
    
    - name: Build and Test Desktop
      run: ./gradlew :composeApp:desktopJar :composeApp:desktopTest
