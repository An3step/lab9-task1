name: Build KMP Project

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # Сборка на Linux (Android, Web, Linux)
  build-linux:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
    
    - name: Make gradlew executable
      run: chmod +x gradlew
    
    - name: Build Android, Web and Linux targets
      run: ./gradlew build
      # Конкретные таргеты для Android и Web
      # run: ./gradlew assembleAndroidDebug assembleWeb jsBrowserProductionWebpack
    
    - name: Run common tests
      run: ./gradlew allTests

  # Сборка на macOS (iOS, macOS)
  build-macos:
    runs-on: macos-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
    
    - name: Make gradlew executable
      run: chmod +x gradlew
    
    - name: Build iOS and macOS targets
      run: ./gradlew build
      # Конкретные таргеты для iOS
      # run: ./gradlew iosX64Test iosSimulatorArm64Test iosArm64 buildMacosX64

  # Сборка на Windows
  build-windows:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
    
    - name: Build Windows target
      run: gradlew.bat build
      # Для Windows desktop приложений
      # run: gradlew.bat buildMingwX64

  # Полная проверка (запускается после всех сборок)
  check-all:
    runs-on: ubuntu-latest
    needs: [build-linux, build-macos, build-windows]
    if: always()
    
    steps:
    - name: Check build status
      run: |
        echo "Build Status:"
        echo "Linux/Android/Web: ${{ needs.build-linux.result }}"
        echo "macOS/iOS: ${{ needs.build-macos.result }}"
        echo "Windows: ${{ needs.build-windows.result }}"
        
        if [ "${{ needs.build-linux.result }}" != "success" ] || \
           [ "${{ needs.build-macos.result }}" != "success" ] || \
           [ "${{ needs.build-windows.result }}" != "success" ]; then
          echo "Some builds failed!"
          exit 1
        fi