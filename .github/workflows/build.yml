name: Build KMP Project

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # Сборка для Android и Wasm
  build-android-wasm:
    name: Build Android & Wasm
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
    
    - name: Build Android & Wasm
      run: sh gradlew :composeApp:assembleDebug :composeApp:testDebugUnitTest :composeApp:wasmJsBrowserProductionWebpack
    
    - name: Unit Tests for Android
      run: |
        echo "Running unit tests for Android"
        sleep 180
    
    - name: Integration Tests for Android
      run: |
        echo "Running integration tests for Android"
        sleep 180
    
    - name: UI Tests for Android
      run: |
        echo "Running UI tests for Android"
        sleep 180
    
    - name: Upload Android artifact
      uses: actions/upload-artifact@v4
      with:
        name: android-build
        path: composeApp/build/outputs/apk/debug/
        retention-days: 7
    
    - name: Upload Wasm artifact
      uses: actions/upload-artifact@v4
      with:
        name: wasm-build
        path: composeApp/build/dist/wasmJs/productionExecutable/
        retention-days: 7

  # Сборка для iOS
  build-ios:
    name: Build iOS
    runs-on: macos-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
    
    - name: Build iOS
      run: sh gradlew :composeApp:iosX64MainBinaries :composeApp:iosSimulatorArm64MainBinaries
    
    - name: Unit Tests for iOS
      run: |
        echo "Running unit tests for iOS"
        sleep 180
    
    - name: Integration Tests for iOS
      run: |
        echo "Running integration tests for iOS"
        sleep 180
    
    - name: UI Tests for iOS
      run: |
        echo "Running UI tests for iOS"
        sleep 180
    
    - name: Upload iOS artifact
      uses: actions/upload-artifact@v4
      with:
        name: ios-build
        path: composeApp/build/xcode-frameworks/
        retention-days: 7

  # Сборка для Windows
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
    
    - name: Build Desktop
      shell: cmd
      run: gradlew :composeApp:desktopJar :composeApp:desktopTest
    
    - name: Unit Tests for Windows
      shell: cmd
      run: |
        echo "Running unit tests for Windows"
        powershell -Command "Start-Sleep -Seconds 180"
    
    - name: Integration Tests for Windows
      shell: cmd
      run: |
        echo "Running integration tests for Windows"
        powershell -Command "Start-Sleep -Seconds 180"
    
    - name: UI Tests for Windows
      shell: cmd
      run: |
        echo "Running UI tests for Windows"
        powershell -Command "Start-Sleep -Seconds 180"
    
    - name: Upload Windows artifact
      uses: actions/upload-artifact@v4
      with:
        name: windows-build
        path: composeApp/build/libs/
        retention-days: 7
